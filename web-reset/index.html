<!doctype html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Şifre Yenileme - Rakibim</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Noto Sans', 'Helvetica Neue', Arial, 'Apple Color Emoji', 'Segoe UI Emoji';
            background: #f0f9ff;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #000;
        }

        p {
            margin: 0 0 24px;
            color: #6b7280;
            font-size: 14px;
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            color: #1f2937;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .input:focus {
            outline: none;
            border-color: #9DB88D;
            box-shadow: 0 0 0 2px rgba(157, 184, 141, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: #9DB88D;
            color: black;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 16px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
        }

        .err {
            background: #fee2e2;
            color: #dc2626;
        }

        .ok {
            background: #dcfce7;
            color: #166534;
        }

        .hidden {
            display: none;
        }

        #google-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #9ca3af;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            margin: 0 10px;
            font-size: 12px;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="card">
        <div class="logo">⚽</div>
        <h1>Şifre Yenileme</h1>
        <p id="instruction">Kimliğinizi doğrulamak için Google ile giriş yapın veya e-posta linkini kullanın.</p>
        
        <div id="auth-section">
            <div id="google-btn-container">
                <div id="g_id_onload"
                    data-client_id="606635332776-6u3e1ok8u2raq9motmai2oglchc9m666.apps.googleusercontent.com"
                    data-context="signin"
                    data-ux_mode="popup"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                    data-type="standard"
                    data-shape="rectangular"
                    data-theme="outline"
                    data-text="signin_with"
                    data-size="large"
                    data-logo_alignment="left">
                </div>
            </div>
        </div>

        <form id="reset-form" class="hidden">
            <input id="pw" class="input" type="password" placeholder="Yeni Şifre (en az 6 karakter)" minlength="6" required />
            <input id="cpw" class="input" type="password" placeholder="Şifreyi Onayla" minlength="6" required />
            <button id="submit" class="btn" type="submit">Şifreyi Güncelle</button>
        </form>
        
        <div id="msg" class="msg hidden"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api'; // Change to your production URL when deploying
        let activeToken = null;

        // Check for token in URL (from email link)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                activeToken = token;
                showResetForm();
            }
        };

        function showResetForm() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('instruction').textContent = 'Lütfen yeni şifrenizi belirleyin.';
            document.getElementById('reset-form').classList.remove('hidden');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = `msg ${type}`;
            msg.classList.remove('hidden');
        }

        async function handleCredentialResponse(response) {
            const idToken = response.credential;
            try {
                const res = await fetch(`${API_URL}/auth/google-verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });

                const data = await res.json();
                if (res.ok) {
                    activeToken = data.resetToken;
                    showResetForm();
                } else {
                    showMessage(data.message || 'Google doğrulaması başarısız oldu.', 'err');
                }
            } catch (error) {
                showMessage('Sunucuya bağlanılamadı.', 'err');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('pw').value.trim();
            const cpw = document.getElementById('cpw').value.trim();
            const btn = document.getElementById('submit');

            if (pw !== cpw) {
                showMessage('Şifreler eşleşmiyor.', 'err');
                return;
            }

            btn.disabled = true;
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: activeToken,
                        newPassword: pw 
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    showMessage('Şifreniz başarıyla güncellendi! Artık uygulamaya giriş yapabilirsiniz.', 'ok');
                    document.getElementById('reset-form').classList.add('hidden');
                    document.getElementById('instruction').classList.add('hidden');
                } else {
                    showMessage(data.message || 'Bir hata oluştu.', 'err');
                }
            } catch (error) {
                showMessage('İşlem sırasında bir hata oluştu.', 'err');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
